[general]
; Interval (seconds) to check for dead game processes
reaper_freq=5

; Set CPU governor to performance while game is running
desiredgov=performance

; Enable soft realtime scheduling automatically when game requests it
softrealtime=auto

; Renice game process to -10 (higher CPU priority)
renice=-10

; Set I/O priority to highest best-effort class
ioprio=0

; Prevent screensaver/display sleep while in game
inhibit_screensaver=1
